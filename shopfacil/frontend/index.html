<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopFácil — Catálogo</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="logo">🛒 ShopFácil</a>
    <div class="nav-links">
      <span id="nav-usuario" style="color:white; font-size:14px;"></span>
      <a href="login.html" id="btn-login">Iniciar sesión</a>
      <a href="agregar-producto.html" id="btn-agregar" style="display:none">+ Agregar producto</a>
      <a href="#" id="btn-logout" onclick="cerrarSesion()" style="display:none">Cerrar sesión</a>
    </div>
  </nav>

  <!-- Contenido principal -->
  <div class="container">
    <h2 style="margin-bottom: 8px;">Catálogo de productos</h2>

    <!-- filtros -->
     <div class="filtros">
      <input
        type="text"
        id="buscador"
        placeholder="🔍 Buscar producto..."
        oninput="filtrar()"
      >
      <select id="categoria" onchange="filtrar()" title="Filtrar por categoría">  <!-- 👈 bloque nuevo -->
        <option value="todos">Todas las categorías</option>
        <option value="ropa">Ropa</option>
        <option value="calzado">Calzado</option>
        <option value="maquillaje">Maquillaje</option>
        <option value="aseo">Aseo</option>
        <option value="tecnologia">Tecnología</option>
        <option value="hogar">Hogar</option>
        <option value="otros">Otros</option>
      </select>

      <input 
        type="number" 
        id="precio-min" 
        placeholder="Precio mínimo"
        oninput="filtrar()"
      >

      <input 
        type="number" 
        id="precio-max" 
        placeholder="Precio máximo"
        oninput="filtrar()"
      >

      <button onclick="limpiarFiltros()">
        Limpiar filtros
      </button>
     </div>


    <!-- Grid de productos -->
    <div id="catalogo" class="catalogo-grid">
      <p>Cargando productos...</p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/catalogo.js"></script>
</body>
</html>
